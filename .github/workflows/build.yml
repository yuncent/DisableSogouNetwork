name: 发布 Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v1.1

      - name: 生成版本资源并编译
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME -replace '^v', ''
          $commaVer = ($ver -replace '\.', ',') + ',0'
          @"
          #include <winresrc.h>
          VS_VERSION_INFO VERSIONINFO
          FILEVERSION     $commaVer
          PRODUCTVERSION  $commaVer
          FILEFLAGSMASK   VS_FFI_FILEFLAGSMASK
          FILEFLAGS       0
          FILEOS          VOS_NT_WINDOWS32
          FILETYPE        VFT_APP
          BEGIN
              BLOCK "StringFileInfo"
              BEGIN
                  BLOCK "040904E4"
                  BEGIN
                      VALUE "FileVersion", "$ver"
                      VALUE "ProductVersion", "$ver"
                      VALUE "ProductName", "FRP 管理器"
                  END
              END
              BLOCK "VarFileInfo"
              BEGIN
                  VALUE "Translation", 0x0409, 0x04E4
              END
          END
          "@ | Out-File -FilePath version.rc -Encoding unicode

          msbuild FrpManager.sln /p:Configuration=Release /p:Platform=x86

      - name: 查找 EXE 输出位置
        if: always()
        shell: pwsh
        run: Get-ChildItem -Recurse -Filter FRPManager.exe | Select-Object FullName

      - name: 打包 ZIP
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Name FRPManager.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "找不到 FRPManager.exe"; exit 1 }
          Copy-Item $exe -Destination .
          Compress-Archive -Path FRPManager.exe -DestinationPath FRPManager.zip

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FRPManager.zip
            FRPManager.exe
          tag_name: ${{ github.ref_name }}
          body: |
            ## FRP 管理器 ${{ github.ref_name }}

            自动构建的 Release，已嵌入版本信息。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
