name: Build DisableSogouNetwork (Latest)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制 JS Actions 用 Node 24

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set version from commit
      run: |
        echo "VERSION=1.0.0+$(git rev-parse --short HEAD)" >> $env:GITHUB_ENV

    - name: Cache MSYS2
      uses: actions/cache@v3
      with:
        path: C:/msys64
        key: msys2-windows-${{ runner.os }}-${{ hashFiles('**/*.cpp') }}
        restore-keys: msys2-windows-

    - name: Install MSYS2 / MinGW
      shell: powershell
      run: |
        if (-Not (Test-Path C:/msys64)) {
          choco install msys2 --yes
        }
        refreshenv
        pacman -Syu --noconfirm
        pacman -S --needed mingw-w64-x86_64-toolchain zip --noconfirm

    - name: Build exe with MinGW
      shell: bash
      run: |
        export PATH=/c/msys64/mingw64/bin:$PATH
        x86_64-w64-mingw32-g++ DisableSogouNetwork.cpp -O2 -std=c++17 \
          -o DisableSogouNetwork.exe -DVERSION=\"${VERSION}\" \
          -lole32 -loleaut32 -luuid -ladvapi32

    - name: Create ZIP
      shell: powershell
      run: |
        Compress-Archive -Path DisableSogouNetwork.exe -DestinationPath DisableSogouNetwork_${VERSION}.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: DisableSogouNetwork
        path: DisableSogouNetwork_${VERSION}.zip
