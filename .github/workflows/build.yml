name: DisableSogouNetwork

on:
  push:
    tags: ['v*']
  workflow_dispatch:         

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 编译
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=amd64
          cl.exe /EHsc /std:c++17 /O2 /GL /MT ^
            /Fe:"DisableSogouNetwork_%GITHUB_REF_NAME%.exe" ^
            DisableSogouNetwork.cpp ^
            /link ole32.lib oleaut32.lib uuid.lib advapi32.lib shell32.lib comctl32.lib gdi32.lib user32.lib comdlg32.lib ^
            /SUBSYSTEM:WINDOWS /MANIFEST:EMBED

      - name: 打包
        shell: cmd
        run: powershell Compress-Archive -Path "DisableSogouNetwork_%GITHUB_REF_NAME%.exe" -DestinationPath "DisableSogouNetwork_%GITHUB_REF_NAME%.zip"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DisableSogouNetwork_${{ github.ref_name }}.exe
            DisableSogouNetwork_${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
          body: |
            搜狗输入法联网管理工具
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
