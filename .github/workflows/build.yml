name: DisableSogouNetwork Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 确定版本号
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          fi

      - name: 编译
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=amd64
          cl.exe /EHsc /std:c++17 /O2 /GL /MT ^
            /DVERSION="%VERSION%" ^
            /Fe:"DisableSogouNetwork_%VERSION%.exe" ^
            DisableSogouNetwork.cpp ^
            /link ole32.lib oleaut32.lib uuid.lib advapi32.lib shell32.lib comctl32.lib gdi32.lib user32.lib comdlg32.lib ^
            /SUBSYSTEM:WINDOWS /MANIFEST:EMBED

      - name: 打包
        shell: cmd
        run: powershell Compress-Archive -Path "DisableSogouNetwork_%VERSION%.exe" -DestinationPath "DisableSogouNetwork_%VERSION%.zip"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DisableSogouNetwork_${{ env.VERSION }}.exe
            DisableSogouNetwork_${{ env.VERSION }}.zip
          tag_name: ${{ env.VERSION }}
          body: |
            搜狗输入法联网管理工具
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
