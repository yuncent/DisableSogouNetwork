name: Build DisableSogouNetwork 

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          mingw-w64-x86_64-toolchain
          zip

    - name: Set version
      shell: bash
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
        else
          echo "VERSION=1.0.0-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        fi

    - name: Compile
      shell: msys2 {0}
      run: |
        g++ DisableSogouNetwork.cpp \
          -O2 -std=c++17 \
          -DVERSION=\"$VERSION\" \
          -static \
          -o "DisableSogouNetwork_$VERSION.exe" \
          -lole32 -loleaut32 -luuid -ladvapi32 -lshell32 -lcomctl32

    - name: Package
      shell: bash
      run: zip "DisableSogouNetwork_$VERSION.zip" "DisableSogouNetwork_$VERSION.exe"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DisableSogouNetwork-${{ env.VERSION }}
        path: "*.zip"

    - name: Release (when tag pushed)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: "*.zip"
