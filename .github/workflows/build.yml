name: Build and Release DisableSogouNetwork

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置版本号
      shell: bash
      run: |
        if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
        else
          echo "VERSION=1.0.0-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        fi

    - name: 编译
      shell: cmd
      run: |
        for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
        call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64

        cl.exe /EHsc /std:c++17 /O2 /GL /MT ^
          /DVERSION="%VERSION%" ^
          /Fe:"DisableSogouNetwork_%VERSION%.exe" ^
          DisableSogouNetwork.cpp ^
          /link ole32.lib oleaut32.lib uuid.lib advapi32.lib shell32.lib comctl32.lib gdi32.lib user32.lib comdlg32.lib ^
          /SUBSYSTEM:WINDOWS

    - name: 打包
      shell: powershell
      run: |
        Compress-Archive -Path "DisableSogouNetwork_${env:VERSION}.exe" `
        -DestinationPath "DisableSogouNetwork_${env:VERSION}.zip"

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: DisableSogouNetwork-${{ env.VERSION }}
        path: "*.zip"

    - name: 自动发布（仅 tag）
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: "*.zip"
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        generate_release_notes: true
