name: Build DisableSogouNetwork (Visual Studio)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set version number
      shell: bash
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
        else
          echo "VERSION=1.0.0-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        fi

    - name: Compile with Visual C++
      shell: cmd
      run: |
        for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
        call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
        cl.exe /EHsc /std:c++17 /O2 /GL /MT ^
          /DVERSION=\"%VERSION%\" ^
          /Fe:"DisableSogouNetwork_%VERSION%.exe" ^
          DisableSogouNetwork.cpp ^
          /link ^
            ole32.lib oleaut32.lib uuid.lib advapi32.lib shell32.lib comctl32.lib gdi32.lib user32.lib comdlg32.lib ^
            /SUBSYSTEM:WINDOWS ^
            /STACK:8388608

    - name: Package artifact
      shell: powershell
      run: Compress-Archive -Path "DisableSogouNetwork_$env:VERSION.exe" -DestinationPath "DisableSogouNetwork_$env:VERSION.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DisableSogouNetwork-${{ env.VERSION }}
        path: "*.zip"

    - name: Create release (when tag pushed)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: "*.zip"
        name: ${{ env.VERSION }}
        tag_name: ${{ github.ref_name }}
