name: Build DisableSogouNetwork (GCC)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install MinGW-w64
      run: |
        sudo apt update
        sudo apt install -y mingw-w64 zip

    - name: Set version from commit
      run: |
        SHORT_HASH=$(git rev-parse --short HEAD)
        echo "VERSION=1.0.0+$SHORT_HASH" >> $GITHUB_ENV

    - name: Build exe (GCC)
      run: |
        x86_64-w64-mingw32-g++ DisableSogouNetwork.cpp -O2 -std=c++17 \
        -o DisableSogouNetwork.exe -DVERSION=\"${VERSION}\"

    - name: Create ZIP
      run: |
        zip DisableSogouNetwork.zip DisableSogouNetwork.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: DisableSogouNetwork
        path: DisableSogouNetwork.zip
